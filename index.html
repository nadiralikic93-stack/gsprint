<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Praćenje Naloga</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh}
.topbar{background:#1F3864;color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.topbar h1{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.topbar .uinfo{font-size:13px;display:flex;align-items:center;gap:10px}
.btn-out{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px}
.btn-out:hover{background:rgba(255,255,255,.3)}
.live{width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1F3864,#2E75B6)}
.login-card{background:#fff;border-radius:14px;padding:40px 36px;width:360px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo .ico{font-size:40px}
.login-logo h2{color:#1F3864;font-size:20px;font-weight:700;margin-top:8px}
.login-logo p{color:#888;font-size:13px;margin-top:4px}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:11px;font-weight:700;color:#555;margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px}
.fg select{width:100%;padding:11px 12px;border:1.5px solid #d1d5db;border-radius:8px;font-size:14px;outline:none}
.fg select:focus{border-color:#2E75B6}
.pinlbl{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.pindots{display:flex;gap:10px;margin-bottom:14px;justify-content:center}
.pd{width:16px;height:16px;border-radius:50%;background:#e0e6ed;transition:.2s;border:2px solid #cdd5df}
.pd.on{background:#1F3864;border-color:#1F3864}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.numpad button{padding:15px;border:1.5px solid #e0e6ed;border-radius:10px;font-size:19px;font-weight:700;background:#fff;cursor:pointer;transition:.15s;color:#1F3864}
.numpad button:hover{background:#f0f6ff;border-color:#2E75B6}
.numpad button:active{transform:scale(.93);background:#dce9f5}
.errmsg{color:#dc2626;font-size:13px;margin-top:10px;text-align:center;min-height:20px;font-weight:500}

.wrap{max-width:1440px;margin:0 auto;padding:20px}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:#fff;border-radius:10px;padding:5px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow-x:auto}
.tab{padding:8px 16px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:700;color:#666;border:none;background:none;transition:.2s;white-space:nowrap}
.tab.active{background:#1F3864;color:#fff}
.tab:hover:not(.active){background:#f0f4f8;color:#1F3864}

.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:22px}
.sc{background:#fff;border-radius:10px;padding:16px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);border-top:3px solid #e0e0e0}
.sc .v{font-size:32px;font-weight:700}
.sc .l{font-size:11px;color:#999;margin-top:4px;font-weight:600;text-transform:uppercase}
.sc.bl{border-top-color:#2E75B6}.sc.bl .v{color:#2E75B6}
.sc.gr{border-top-color:#16a34a}.sc.gr .v{color:#16a34a}
.sc.pu{border-top-color:#7c3aed}.sc.pu .v{color:#7c3aed}
.sc.or{border-top-color:#ea580c}.sc.or .v{color:#ea580c}
.sc.re{border-top-color:#dc2626}.sc.re .v{color:#dc2626}

.shdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.shdr h2{font-size:15px;font-weight:700;color:#1F3864}
.btns{display:flex;gap:8px;flex-wrap:wrap}
.btn{border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:5px}
.btn-blue{background:#1F3864;color:#fff}.btn-blue:hover{background:#2E75B6}
.btn-green{background:#16a34a;color:#fff}.btn-green:hover{background:#15803d}
.btn-orange{background:#ea580c;color:#fff}.btn-orange:hover{background:#c2410c}
.btn-grey{background:#f3f4f6;color:#374151;border:1px solid #e5e7eb}.btn-grey:hover{background:#e5e7eb}

.tw{background:#fff;border-radius:10px;overflow:auto;box-shadow:0 1px 4px rgba(0,0,0,.06)}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:750px}
th{background:#1F3864;color:#fff;padding:10px 12px;text-align:left;font-weight:700;white-space:nowrap;font-size:12px}
td{padding:9px 12px;border-bottom:1px solid #f0f2f5;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f7faff}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.bd{background:#dcfce7;color:#15803d}
.bi{background:#dbeafe;color:#1d4ed8}
.bw{background:#fef3c7;color:#92400e}
.bl2{background:#fee2e2;color:#991b1b}
.bc{background:#f3e8ff;color:#6b21a8}
.pb{height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden;width:70px;display:inline-block;vertical-align:middle}
.pf{height:100%;background:#2E75B6;border-radius:3px}
.pf.done{background:#16a34a}

.fcard{background:#fff;border-radius:10px;padding:24px;max-width:800px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.fcard h2{font-size:16px;font-weight:700;color:#1F3864;margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid #f0f2f5}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fgrid .full{grid-column:1/-1}
.fgrid label{display:block;font-size:11px;font-weight:700;color:#555;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.fgrid input,.fgrid select,.fgrid textarea{width:100%;padding:9px 12px;border:1.5px solid #d1d5db;border-radius:7px;font-size:13px;outline:none}
.fgrid input:focus,.fgrid select:focus{border-color:#2E75B6}
.sdiv{font-size:12px;font-weight:700;color:#1F3864;text-transform:uppercase;letter-spacing:.6px;margin:18px 0 10px;padding-bottom:6px;border-bottom:2px solid #e5e7eb}
.ochk{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1.5px solid #e5e7eb;border-radius:7px;cursor:pointer;font-size:13px;transition:.15s}
.ochk:hover{border-color:#2E75B6;background:#f0f6ff}
.ochk input{width:auto;cursor:pointer}
.ogrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:8px;margin-top:6px}
.ferr{color:#dc2626;font-size:13px;margin-top:10px;font-weight:500;min-height:20px}
.fok{color:#16a34a;font-size:13px;margin-top:8px;font-weight:600}

/* INFO BOX za komercijalu */
.info-box{background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:10px;padding:16px 20px;margin-bottom:20px;font-size:13px;color:#1e40af}
.info-box b{display:block;margin-bottom:4px;font-size:14px}

/* TEHNOLOG - doradi nalog */
.nalog-setup{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:14px}
.nalog-setup h3{font-size:15px;font-weight:700;color:#1F3864;margin-bottom:6px}
.nalog-setup .meta{font-size:12px;color:#6b7280;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:10px}
.setup-ops{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:8px;margin-bottom:14px}
.setup-btn{background:#1F3864;color:#fff;border:none;border-radius:7px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer}
.setup-btn:hover{background:#2E75B6}
.setup-btn:disabled{background:#9ca3af;cursor:default}
.already-set{background:#f0fdf4;border:1.5px solid #86efac;border-radius:8px;padding:10px 14px;font-size:13px;color:#15803d;font-weight:600}

.ngrid{display:grid;gap:14px}
.nc{background:#fff;border-radius:10px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-left:4px solid #2E75B6}
.nc.late{border-left-color:#dc2626}
.nc h3{font-size:15px;font-weight:700;color:#1F3864;margin-bottom:4px}
.nmeta{display:flex;flex-wrap:wrap;gap:10px;font-size:12px;color:#6b7280;margin-bottom:14px}
.nmeta b{color:#374151}
.obts{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px}
.ob{padding:10px 13px;border:1.5px solid #d1d5db;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;text-align:left;transition:.2s;width:100%}
.ob:hover:not(.lk){border-color:#2E75B6;background:#eff6ff}
.ob.lk{background:#f0fdf4;border-color:#86efac;cursor:default}
.ob .on{display:block;font-weight:700;color:#1F3864;margin-bottom:2px}
.ob.lk .on{color:#15803d}
.ob .om{display:block;font-size:11px;color:#9ca3af}
.ob.lk .om{color:#16a34a}

/* ARHIVA */
.arch-filters{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.arch-filters input,.arch-filters select{padding:8px 12px;border:1.5px solid #d1d5db;border-radius:7px;font-size:13px;outline:none}

.rbadge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;margin-left:6px}
.rb-dir{background:#fef3c7;color:#92400e}
.rb-adm{background:#dbeafe;color:#1d4ed8}
.rb-teh{background:#f3e8ff;color:#6b21a8}
.rb-dtp{background:#fce7f3;color:#9d174d}
.rb-kom{background:#dbeafe;color:#1e40af}
.rb-skl{background:#d1fae5;color:#065f46}
.rb-tra{background:#fef9c3;color:#854d0e}
.rb-rad{background:#f3f4f6;color:#374151}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px}
.modal{background:#fff;border-radius:14px;width:100%;max-width:760px;max-height:92vh;overflow-y:auto;padding:28px}
.modal h3{font-size:17px;font-weight:700;color:#1F3864;margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid #f0f2f5}
.mops{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:8px}
.mo{border:1.5px solid #e5e7eb;border-radius:8px;padding:10px 12px}
.mo.fin{border-color:#86efac;background:#f0fdf4}
.mo .ot{font-size:12px;font-weight:700;color:#374151;margin-bottom:4px}
.mo.fin .ot{color:#15803d}
.mo .oi{font-size:11px;color:#9ca3af}
.mo.fin .oi{color:#16a34a}
.mmeta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;font-size:13px}
.mmeta div{padding:8px;background:#f9fafb;border-radius:6px}
.mmeta b{color:#1F3864}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid #f0f2f5}

.hidden{display:none!important}
.loading{text-align:center;padding:50px;color:#6b7280;font-size:14px}

@media print {
  .topbar,.tabs,.btns,.btn,.arch-filters{display:none!important}
  body{background:#fff}
  .tw,.fcard,.nc{box-shadow:none}
  .wrap{padding:0}
}
</style>
</head>
<body>

<div id="loginPage">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="ico">🏭</div>
        <h2>Praćenje Naloga</h2>
        <p>Produkcija &amp; Operacije</p>
      </div>
      <div class="fg">
        <label>Ime</label>
        <select id="loginUser"><option value="">— Odaberite —</option></select>
      </div>
      <div class="pinlbl">PIN kod</div>
      <div class="pindots" id="pinD">
        <div class="pd" id="d0"></div><div class="pd" id="d1"></div>
        <div class="pd" id="d2"></div><div class="pd" id="d3"></div>
      </div>
      <div class="numpad" id="numpad"></div>
      <div class="errmsg" id="loginErr"></div>
    </div>
  </div>
</div>

<div id="appPage" class="hidden">
  <div class="topbar">
    <h1><span class="live"></span> Praćenje Proizvodnih Naloga</h1>
    <div class="uinfo">
      <span id="topUser"></span>
      <button class="btn-out" onclick="doLogout()">Odjava</button>
    </div>
  </div>
  <div class="wrap">
    <div class="tabs" id="tabBar"></div>
    <div id="tabContent"></div>
  </div>
</div>

<div id="modalBg" class="modal-bg hidden" onclick="bgClick(event)">
  <div class="modal" id="modalBox"></div>
</div>

<script>
const SB="https://voxqsyeiodmsxzwednex.supabase.co", SK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZveHFzeWVpb2Rtc3h6d2VkbmV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NTYwMDUsImV4cCI6MjA5NjAzMjAwNX0.vKT8vghN9GYVqyOB1mRL76Vz9CmGMIhMzNJsvjrF1c0";

const USERS=[
  {name:"BEGIĆ EDIN",        pin:"1001",role:"radnik"},
  {name:"BEKLIJA BELMIN",    pin:"1002",role:"radnik"},
  {name:"BOJIĆ SALIH",       pin:"1003",role:"radnik"},
  {name:"BULAJA MENSUR",     pin:"1004",role:"radnik"},
  {name:"CRNKIĆ MIRZAD",     pin:"1016",role:"radnik"},
  {name:"DUJSIĆ MIRNESA",    pin:"1007",role:"radnik"},
  {name:"ĐANANOVIĆ ELVEDIN", pin:"1009",role:"radnik"},
  {name:"HABIBIĆ MELISA",    pin:"1006",role:"radnik"},
  {name:"HIDIĆ ASIM",        pin:"1010",role:"radnik"},
  {name:"HIDIĆ ATENA",       pin:"1011",role:"radnik"},
  {name:"MARKOVIĆ VEDRAN",   pin:"1013",role:"radnik"},
  {name:"PINJO MIRALEM",     pin:"1017",role:"radnik"},
  {name:"RAMIĆ HUSEIN",      pin:"1018",role:"radnik"},
  {name:"RAMIĆ MINETA",      pin:"1019",role:"radnik"},
  {name:"SARAJLIĆ SENADIN",  pin:"1022",role:"radnik"},
  {name:"ŠEHIĆ SIFET",       pin:"1023",role:"radnik"},
  {name:"ŠILJAK ARIFA",      pin:"1025",role:"radnik"},
  {name:"ZOLOTA KASIM",      pin:"1028",role:"radnik"},
  {name:"MUJČIĆ BERINA",     pin:"1015",role:"dtp"},
  {name:"TOPČIĆ NERMIN",     pin:"1027",role:"dtp"},
  {name:"ČELEBIĆ BAHRUDIN",  pin:"1005",role:"tehnolog"},
  {name:"MUJČIĆ NERMIN",     pin:"1014",role:"komercijala"},
  {name:"ĐANANOVIĆ EMIRA",   pin:"1008",role:"komercijala"},
  {name:"TOMIĆ JASNA",       pin:"1026",role:"skladiste"},
  {name:"HODŽIĆ EDIN",       pin:"1012",role:"transport"},
  {name:"DIREKTOR",          pin:"9999",role:"direktor"},
  {name:"ADMIN",             pin:"0000",role:"admin"},
];

const OPS_ALL=[
  "Priprema","Štancanje","Optrgavanje","Lijepljenje","Rezanje",
  "Falcanje","Cantraganje","Šivanje","Izrada Korica","Lajmanje",
  "Ubacivanje u Korice","Presvlačenje Blokova","Šlajfanje",
  "Uvezivanje","Pakovanje","Izrada Trans. Kutija","Flexo Štampa",
  "DTP Priprema","Tehnološka Priprema","Odobrenje Tehnologa",
  "Unos Narudžbe","Potvrda Narudžbe","Nabava Materijala",
  "Prijem Sirovina","Otprema Gotovih Proizvoda"
];

// Koje operacije svaka uloga MOŽE završiti
const ROLE_OPS={
  direktor:"all", admin:"all",
  tehnolog:["Tehnološka Priprema","Odobrenje Tehnologa",
            "Priprema","Štancanje","Optrgavanje","Lijepljenje","Rezanje",
            "Falcanje","Cantraganje","Šivanje","Izrada Korica","Lajmanje",
            "Ubacivanje u Korice","Presvlačenje Blokova","Šlajfanje",
            "Uvezivanje","Pakovanje","Izrada Trans. Kutija","Flexo Štampa"],
  dtp:["DTP Priprema"],
  komercijala:["Unos Narudžbe","Potvrda Narudžbe","Nabava Materijala"],
  skladiste:["Prijem Sirovina","Otprema Gotovih Proizvoda"],
  transport:["Pakovanje","Izrada Trans. Kutija"],
  radnik:["Priprema","Štancanje","Optrgavanje","Lijepljenje","Rezanje",
          "Falcanje","Cantraganje","Šivanje","Izrada Korica","Lajmanje",
          "Ubacivanje u Korice","Presvlačenje Blokova","Šlajfanje",
          "Uvezivanje","Pakovanje","Izrada Trans. Kutija","Flexo Štampa"],
};

const ROLE_LABELS={direktor:"Direktor",admin:"Admin",tehnolog:"Tehnolog / Voditelj",
  dtp:"DTP Priprema",komercijala:"Komercijala",skladiste:"Skladište",
  transport:"Transport",radnik:"Radnik"};
const ROLE_BADGE={direktor:"rb-dir",admin:"rb-adm",tehnolog:"rb-teh",
  dtp:"rb-dtp",komercijala:"rb-kom",skladiste:"rb-skl",
  transport:"rb-tra",radnik:"rb-rad"};

let nalozi=[],operacije=[],cu=null,pinBuf="",rt=null;

// ── API ───────────────────────────────────────────────────────────────────────
async function api(path,method="GET",body=null){
  const r=await fetch(SB+"/rest/v1/"+path,{
    method,
    headers:{"Content-Type":"application/json","apikey":SK,"Authorization":"Bearer "+SK,
              "Prefer":method==="POST"?"return=representation":""},
    body:body?JSON.stringify(body):null
  });
  if(!r.ok){const t=await r.text();throw new Error(t);}
  if(r.status===204)return null;
  return r.json();
}
async function loadAll(){
  const [n,o]=await Promise.all([
    api("nalozi?select=*&order=kreiran.desc"),
    api("operacije?select=*&order=redoslijed.asc,id.asc")
  ]);
  nalozi=n||[]; operacije=o||[];
  nalozi.forEach(n=>{
    n.operacije=operacije.filter(o=>o.nalog_id===n.id);
    const d=n.operacije.filter(o=>o.zavrsen).length,t=n.operacije.length;
    n.status=t===0?"ČEKA":d===t?"ZAVRŠENO":d>0?"U TOKU":"ČEKA";
  });
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function initLogin(){
  try{
  const sel=document.getElementById("loginUser");
  const groups=[
    {lbl:"Uprava",        roles:["direktor","admin"]},
    {lbl:"Tehnologija",   roles:["tehnolog"]},
    {lbl:"DTP Priprema",  roles:["dtp"]},
    {lbl:"Komercijala",   roles:["komercijala"]},
    {lbl:"Skladiste",     roles:["skladiste"]},
    {lbl:"Transport",     roles:["transport"]},
    {lbl:"Proizvodnja",   roles:["radnik"]},
  ];
  groups.forEach(g=>{
    const m=USERS.filter(u=>g.roles.includes(u.role)).sort((a,b)=>a.name>b.name?1:-1);
    if(!m.length)return;
    const og=document.createElement("optgroup");og.label="--- "+g.lbl+" ---";
    m.forEach(u=>{const o=document.createElement("option");o.value=u.name;o.textContent=u.name;og.appendChild(o);});
    sel.appendChild(og);
  });
  }catch(e){console.error("initLogin error:",e);}
  const np=document.getElementById("numpad");
  [1,2,3,4,5,6,7,8,9,"✕",0,"⌫"].forEach(k=>{
    const b=document.createElement("button");b.textContent=k;b.onclick=()=>pinPress(k);np.appendChild(b);
  });
}
function pinPress(k){
  if(k==="✕")pinBuf="";
  else if(k==="⌫")pinBuf=pinBuf.slice(0,-1);
  else if(pinBuf.length<4)pinBuf+=String(k);
  for(let i=0;i<4;i++)document.getElementById("d"+i).classList.toggle("on",i<pinBuf.length);
  if(pinBuf.length===4)setTimeout(doLogin,150);
}
async function doLogin(){
  const name=document.getElementById("loginUser").value;
  const err=document.getElementById("loginErr");
  if(!name){err.textContent="Odaberite ime!";return;}
  const u=USERS.find(x=>x.name===name&&x.pin===pinBuf);
  if(!u){err.textContent="Pogrešan PIN!";pinBuf="";for(let i=0;i<4;i++)document.getElementById("d"+i).classList.remove("on");return;}
  cu=u;err.textContent="";
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("appPage").classList.remove("hidden");
  document.getElementById("topUser").innerHTML=u.name+`<span class="rbadge ${ROLE_BADGE[u.role]}">${ROLE_LABELS[u.role]}</span>`;
  document.getElementById("tabContent").innerHTML=`<div class="loading">⏳ Učitavanje...</div>`;
  await loadAll();
  renderApp();
  startRT();
}
function doLogout(){
  stopRT();cu=null;pinBuf="";
  document.getElementById("loginUser").value="";
  for(let i=0;i<4;i++)document.getElementById("d"+i).classList.remove("on");
  document.getElementById("loginPage").classList.remove("hidden");
  document.getElementById("appPage").classList.add("hidden");
}
function startRT(){stopRT();rt=setInterval(async()=>{await loadAll();const t=getTabs()[activeTab];if(t!=="Unos Naloga"&&t!=="Podesi Nalog"&&document.getElementById("modalBg").classList.contains("hidden"))renderTab();},8000);}
function stopRT(){if(rt){clearInterval(rt);rt=null;}}

// ── TABS ──────────────────────────────────────────────────────────────────────
function getTabs(){
  const r=cu.role;
  if(r==="direktor") return ["Dashboard","Svi Nalozi","Arhiva","Statistike"];
  if(r==="admin")    return ["Dashboard","Svi Nalozi","Unos Naloga","Arhiva","Statistike"];
  if(r==="tehnolog") return ["Dashboard","Podesi Nalog","Moji Zadaci","Svi Nalozi","Arhiva"];
  if(r==="komercijala") return ["Unos Naloga","Svi Nalozi","Arhiva"];
  if(r==="dtp")      return ["Moji Zadaci","Svi Nalozi"];
  if(r==="skladiste")return ["Moji Zadaci","Svi Nalozi"];
  if(r==="transport")return ["Moji Zadaci","Svi Nalozi"];
  return ["Moji Zadaci","Svi Nalozi"];
}
let activeTab=0;
function renderApp(){activeTab=0;buildTabs();renderTab();}
function buildTabs(){
  const tabs=getTabs(),bar=document.getElementById("tabBar");bar.innerHTML="";
  tabs.forEach((t,i)=>{
    const b=document.createElement("button");
    b.className="tab"+(i===activeTab?" active":"");
    b.textContent=t;b.onclick=()=>{activeTab=i;buildTabs();renderTab();};
    bar.appendChild(b);
  });
}
function renderTab(){
  const t=getTabs()[activeTab],el=document.getElementById("tabContent");
  if(t==="Unos Naloga"||t==="Podesi Nalog"){stopRT();el.innerHTML=t==="Unos Naloga"?renderForm():renderPodesi();return;}
  if(!rt)startRT();
  if(t==="Dashboard")el.innerHTML=renderDash();
  else if(t==="Svi Nalozi")el.innerHTML=renderSvi();
  else if(t==="Moji Zadaci")el.innerHTML=renderMoji();
  else if(t==="Arhiva")el.innerHTML=renderArhiva();
  else if(t==="Statistike")el.innerHTML=renderStats();
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function fd(d){if(!d)return"—";const x=new Date(d);return x.getDate().toString().padStart(2,"0")+"."+(x.getMonth()+1).toString().padStart(2,"0")+"."+x.getFullYear();}
function td(){return new Date().toISOString().split("T")[0];}
function isLate(n){return n.isporuka&&n.status!=="ZAVRŠENO"&&new Date(n.isporuka)<new Date(td());}
function pct(n){const ops=n.operacije||[],d=ops.filter(o=>o.zavrsen).length;return ops.length?Math.round(d/ops.length*100):0;}

    <div class="sc gr"><div class="v">${done}</div><div class="l">Završeno</div></div>
    <div class="sc pu"><div class="v">${inp}</div><div class="l">U Toku</div></div>

// ── MOJI ZADACI ───────────────────────────────────────────────────────────────
function renderMoji(){
  const myOps=ROLE_OPS[cu.role];
  const active=nalozi.filter(n=>n.status!=="ZAVRŠENO"&&n.operacije&&n.operacije.length>0);
  if(!active.length)return`<p style="color:#9ca3af;padding:24px">Nema aktivnih naloga.</p>`;
  let html=`<div class="ngrid">`;
  active.forEach(n=>{
    const ops=n.operacije||[];
    const myList=myOps==="all"?ops:ops.filter(o=>myOps.includes(o.naziv));
    if(!myList.length)return;
    const p=pct(n),late=isLate(n);
    html+=`<div class="nc${late?" late":""}">
      <h3>Nalog #${n.broj} — ${n.naziv}</h3>
      <div class="nmeta">
        <span>Naručilac: <b>${n.narucilac}</b></span>
        <span>Isporuka: <b style="color:${late?"#dc2626":"inherit"}">${fd(n.isporuka)}</b></span>
        <span>Kol: <b>${n.kolicina||"—"}</b></span>
        <span>Napredak: <b>${p}%</b></span>
        ${n.dtp_priprema?`<span style="background:#fce7f3;color:#9d174d;padding:2px 8px;border-radius:10px;font-weight:700;font-size:11px">DTP</span>`:""}
      </div>
      <div class="obts">`;
    myList.forEach(op=>{
      html+=op.zavrsen
        ?`<div class="ob lk"><span class="on">✓ ${op.naziv}</span><span class="om">${op.radnik} • ${fd(op.datum)}</span></div>`
        :`<button class="ob" onclick="finishOp(${op.id},'${n.id}','${op.naziv.replace(/'/g,"\'")}')"><span class="on">${op.naziv}</span><span class="om">Klikni → označi završeno</span></button>`;
    });
    html+=`</div></div></div>`;
  });
  return html+`</div>`;
}

  <div id="fOk" class="fok"></div>

async function saveNalog(){
  const g=id=>(document.getElementById(id)||{value:""}).value||"";
  const broj=g("fBroj").trim(),naziv=g("fNaziv").trim(),narc=g("fNarc").trim();
  const kol=g("fKol").trim(),prijem=g("fPrijem"),isp=g("fIsp"),note=g("fNote").trim();
  const dtp=document.getElementById("fDtp")&&document.getElementById("fDtp").checked;
  const errEl=document.getElementById("fErr"),okEl=document.getElementById("fOk");
  errEl.textContent="";okEl.textContent="";
  if(!broj||!naziv||!narc){errEl.textContent="Broj naloga, naziv i naručilac su obavezni!";return;}
  const btn=document.getElementById("btnSave");
  btn.textContent="⏳ Čuvam...";btn.disabled=true;
  try{
    const id=Date.now().toString();
    // Komercijala samo unosi nalog BEZ operacija — tehnolog ih dodaje
    await api("nalozi","POST",{id,broj,naziv,narucilac:narc,kolicina:kol,
      prijem:prijem||td(),isporuka:isp,napomena:note,status:"ČEKA",
      dtp_priprema:dtp,kreiran:td(),kreirao:cu.name});
    await loadAll();
    okEl.textContent="✅ Nalog "+broj+" sačuvan! Tehnolog treba postaviti operacije.";
    btn.textContent="💾 Sačuvaj nalog";btn.disabled=false;
    startRT();
  }catch(e){
    errEl.textContent="Greška: "+e.message;
    btn.textContent="💾 Sačuvaj nalog";btn.disabled=false;
    startRT();
  }
}

// ── PODESI NALOG (samo tehnolog) ──────────────────────────────────────────────

  </div>`;

    html+=`<div class="shdr"><h2>⚠️ Nalozi koji čekaju postavljanje operacija (${needSetup.length})</h2></div>`;
    needSetup.forEach(n=>{
      html+=`<div class="nalog-setup">
        <h3>Nalog #${n.broj} — ${n.naziv}</h3>
        <div class="meta">
          <span>Naručilac: <b>${n.narucilac}</b></span>
          <span>Isporuka: <b>${fd(n.isporuka)}</b></span>
          <span>Kol: <b>${n.kolicina||"—"}</b></span>
          ${n.dtp_priprema?`<span style="background:#fce7f3;color:#9d174d;padding:2px 8px;border-radius:10px;font-weight:700;font-size:11px">DTP ✓</span>`:""}
          ${n.napomena?`<span>Napomena: <b>${n.napomena}</b></span>`:""}
        </div>

        <div class="ogrid" id="ops_${n.id}">
          ${n.dtp_priprema?`<label class="ochk"><input type="checkbox" value="DTP Priprema" checked> DTP Priprema</label>`:""}
          <label class="ochk"><input type="checkbox" value="Tehnološka Priprema" checked> Tehnološka Priprema</label>
          <label class="ochk"><input type="checkbox" value="Unos Narudžbe"> Unos Narudžbe</label>
          <label class="ochk"><input type="checkbox" value="Nabava Materijala"> Nabava Materijala</label>
          <label class="ochk"><input type="checkbox" value="Prijem Sirovina"> Prijem Sirovina</label>
          ${["Priprema","Štancanje","Optrgavanje","Lijepljenje","Rezanje","Falcanje","Cantraganje","Šivanje","Izrada Korica","Lajmanje","Ubacivanje u Korice","Presvlačenje Blokova","Šlajfanje","Uvezivanje","Pakovanje","Izrada Trans. Kutija","Flexo Štampa"].map(op=>`<label class="ochk"><input type="checkbox" value="${op}" checked> ${op}</label>`).join("")}
          <label class="ochk"><input type="checkbox" value="Odobrenje Tehnologa" checked> Odobrenje Tehnologa</label>
          <label class="ochk"><input type="checkbox" value="Otprema Gotovih Proizvoda"> Otprema Gotovih Proizvoda</label>
        </div>
        <button class="setup-btn" onclick="postaviOps('${n.id}')" style="margin-top:14px">✅ Postavi operacije za ovaj nalog</button>
        <div id="setup_err_${n.id}" style="color:#dc2626;font-size:13px;margin-top:6px"></div>
      </div>`;
    });
  } else {
    html+=`<div style="background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:16px 20px;margin-bottom:20px;font-size:13px;color:#15803d;font-weight:600">✅ Svi nalozi imaju postavljene operacije.</div>`;
  }

  if(hasOps.length){
    html+=`<div class="shdr" style="margin-top:20px"><h2>Aktivni nalozi sa operacijama</h2></div>
    <div class="tw">${makeTable(hasOps)}</div>`;
  }
  return html;

async function postaviOps(nalogId){
  const container=document.getElementById("ops_"+nalogId);
  const errEl=document.getElementById("setup_err_"+nalogId);
  const checked=Array.from(container.querySelectorAll("input[type=checkbox]:checked")).map(c=>c.value);
  if(!checked.length){errEl.textContent="Odaberite bar jednu operaciju!";return;}
  const btn=container.parentElement.querySelector(".setup-btn");
  btn.disabled=true;btn.textContent="⏳ Čuvam...";
  try{
    const opsArr=checked.map((naziv,i)=>({nalog_id:nalogId,naziv,zavrsen:false,radnik:"",datum:"",redoslijed:i}));
    await api("operacije","POST",opsArr);
    await api("nalozi?id=eq."+nalogId,"PATCH",{status:"ČEKA"});
    await loadAll();
    renderTab();
  }catch(e){
    errEl.textContent="Greška: "+e.message;
    btn.disabled=false;btn.textContent="✅ Postavi operacije";
  }
}

// ── FINISH OP ─────────────────────────────────────────────────────────────────
async function finishOp(opId,nalogId,opNaziv){
  if(!confirm(`Označiti "${opNaziv}" kao završenu?

⚠️ Ne može se poništiti!`))return;
  try{
    await api("operacije?id=eq."+opId,"PATCH",{zavrsen:true,radnik:cu.name,datum:td()});
    await loadAll();
    const n=nalozi.find(x=>x.id===nalogId);
    if(n)await api("nalozi?id=eq."+nalogId,"PATCH",{status:n.status});
    await loadAll();renderTab();
  }catch(e){alert("Greška: "+e.message);}
}

// ── STATISTIKE ────────────────────────────────────────────────────────────────
function renderStats(){
  const ws={};
  nalozi.forEach(n=>(n.operacije||[]).filter(o=>o.zavrsen).forEach(o=>{
    if(!ws[o.radnik])ws[o.radnik]=0;ws[o.radnik]++;
  }));
  const sorted=Object.entries(ws).sort((a,b)=>b[1]-a[1]);
  let html=`<div class="shdr"><h2>Završene operacije po radniku</h2>
    <button class="btn btn-green" onclick="exportExcel()">📊 Export Excel</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:24px">`;
  if(!sorted.length)html+=`<p style="color:#9ca3af">Nema podataka.</p>`;
  sorted.forEach(([name,c])=>{
    html+=`<div style="background:#fff;border-radius:10px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)">
      <div style="font-size:13px;font-weight:700;color:#1F3864;margin-bottom:6px">${name}</div>
      <div style="font-size:26px;font-weight:700;color:#2E75B6">${c}</div>
      <div style="font-size:11px;color:#9ca3af">završenih operacija</div></div>`;
  });
  html+=`</div><div class="shdr"><h2>Svi nalozi</h2></div><div class="tw">${makeTable(nalozi)}</div>`;
  return html;
}

// ── TABLE ─────────────────────────────────────────────────────────────────────
function makeTable(list){
  if(!list.length)return`<p style="padding:20px;color:#9ca3af">Nema naloga.</p>`;
  let h=`<table><thead><tr><th>Nalog</th><th>Naručilac</th><th>Kol.</th><th>Prijem</th><th>Isporuka</th><th>Napredak</th><th>Status</th><th></th></tr></thead><tbody>`;
  list.forEach(n=>{
    const ops=n.operacije||[],done=ops.filter(o=>o.zavrsen).length;
    const p=pct(n),late=isLate(n),noOps=ops.length===0;
    const bc=n.status==="ZAVRŠENO"?"bd":noOps?"bc":n.status==="U TOKU"?"bi":late?"bl2":"bw";
    const bt=noOps?"⚙️ POSTAVLJANJE":late&&n.status!=="ZAVRŠENO"?"⚠️ KASNI":n.status;
    h+=`<tr data-kreiran="${n.kreiran||""}">
      <td><b>${n.broj}</b>${n.dtp_priprema?` <span style="font-size:10px;background:#fce7f3;color:#9d174d;padding:1px 6px;border-radius:8px;font-weight:700">DTP</span>`:""}<br><span style="font-size:11px;color:#9ca3af">${n.naziv}</span></td>
      <td>${n.narucilac}</td><td>${n.kolicina||"—"}</td>
      <td>${fd(n.prijem)}</td>
      <td style="color:${late&&n.status!=="ZAVRŠENO"?"#dc2626":"inherit"}">${fd(n.isporuka)}</td>
      <td>${noOps?`<span style="color:#7c3aed;font-size:12px;font-weight:600">Čeka tehnologa</span>`:`<div style="display:flex;align-items:center;gap:6px"><div class="pb"><div class="pf${p===100?" done":""}" style="width:${p}%"></div></div><span style="font-size:11px;color:#6b7280">${p}% (${done}/${ops.length})</span></div>`}</td>
      <td><span class="badge ${bc}">${bt}</span></td>
      <td><button onclick="showDetail('${n.id}')" class="btn btn-grey" style="padding:4px 10px;font-size:11px">Detalji</button></td></tr>`;
  });
  return h+`</tbody></table>`;
}

// ── DETAIL MODAL ──────────────────────────────────────────────────────────────
function showDetail(id){
  const n=nalozi.find(x=>x.id===id);if(!n)return;
  const ops=n.operacije||[],done=ops.filter(o=>o.zavrsen).length;
  let html=`<h3>Nalog ${n.broj} — ${n.naziv}</h3>
  <div class="mmeta">
    <div><b>Naručilac:</b> ${n.narucilac}</div><div><b>Količina:</b> ${n.kolicina||"—"}</div>
    <div><b>Datum prijema:</b> ${fd(n.prijem)}</div><div><b>Datum isporuke:</b> ${fd(n.isporuka)}</div>
    <div><b>Status:</b> ${n.status}</div><div><b>Napredak:</b> ${done}/${ops.length}</div>
    <div><b>DTP:</b> ${n.dtp_priprema?"✅ Da":"❌ Ne"}</div><div><b>Unio:</b> ${n.kreirao||"—"}</div>
    ${n.napomena?`<div style="grid-column:1/-1"><b>Napomena:</b> ${n.napomena}</div>`:""}
  </div>
  <div style="font-weight:700;font-size:12px;color:#1F3864;margin-bottom:10px;text-transform:uppercase">Operacije:</div>
  <div class="mops">`;
  ops.forEach(op=>{
    html+=op.zavrsen
      ?`<div class="mo fin"><div class="ot">✓ ${op.naziv}</div><div class="oi">${op.radnik}<br>${fd(op.datum)}</div></div>`
      :`<div class="mo"><div class="ot">${op.naziv}</div><div class="oi">Nije završeno</div></div>`;
  });
  html+=`</div><div class="mfoot">
    <button class="btn btn-green" onclick="exportSingleExcel('${n.id}')">📊 Export</button>
    <button class="btn btn-grey" onclick="closeModal()">Zatvori</button>
  </div>`;
  showModal(html);
}

// ── EXPORT EXCEL ──────────────────────────────────────────────────────────────
function exportExcel(archiveOnly){
  var list=archiveOnly?nalozi.filter(function(n){return n.status==="ZAVRŠENO";}):nalozi;
  var NL="\n", SEP=",";
  var allOpNames=[];
  nalozi.forEach(function(n){(n.operacije||[]).forEach(function(o){if(allOpNames.indexOf(o.naziv)<0)allOpNames.push(o.naziv);});});
  var hdr="Br. Naloga,Naziv,Narucilac,Kolicina,Datum Prijema,Datum Isporuke,Status,Zavrseno,DTP,Kreirao";
  allOpNames.forEach(function(op){ hdr+=SEP+'"'+op+' - Radnik"'+SEP+'"'+op+' - Datum"'; });
  var rows=[hdr];
  list.forEach(function(n){
    var ops=n.operacije||[],done=ops.filter(function(o){return o.zavrsen;}).length;
    var p=ops.length?Math.round(done/ops.length*100):0;
    var row='"'+n.broj+'","'+n.naziv+'","'+n.narucilac+'","'+(n.kolicina||"")+'","'+fd(n.prijem)+'","'+fd(n.isporuka)+'","'+n.status+'","'+p+'%","'+(n.dtp_priprema?"Da":"Ne")+'","'+(n.kreirao||"")+'"';
    allOpNames.forEach(function(opName){
      var op=ops.find(function(o){return o.naziv===opName;});
      if(op&&op.zavrsen){row+=SEP+'"'+op.radnik+'"'+SEP+'"'+fd(op.datum)+'"';}
      else if(op){row+=SEP+'"U toku"'+SEP+'""';}
      else{row+=SEP+'"N/A"'+SEP+'""';}
    });
    rows.push(row);
  });
  var csv=rows.join(NL);
  var blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download="nalozi_"+td()+".csv";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function exportSingleExcel(id){
  var n=nalozi.find(function(x){return x.id===id;});if(!n)return;
  var ops=n.operacije||[];
  var NL="\n";
  var rows=[
    "Br. Naloga,"+n.broj,
    "Naziv,"+n.naziv,
    "Narucilac,"+n.narucilac,
    "Kolicina,"+(n.kolicina||""),
    "Datum Prijema,"+fd(n.prijem),
    "Datum Isporuke,"+fd(n.isporuka),
    "Status,"+n.status,
    "DTP,"+(n.dtp_priprema?"Da":"Ne"),
    "Kreirao,"+(n.kreirao||""),
    "Napomena,"+(n.napomena||""),
    "",
    "Operacija,Radnik,Datum Zavrsetka"
  ];
  ops.forEach(function(op){
    rows.push('"'+op.naziv+'","'+(op.zavrsen?op.radnik:"")+'","'+(op.zavrsen?fd(op.datum):"")+'"');
  });
  var csv=rows.join(NL);
  var blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download="nalog_"+n.broj+"_"+td()+".csv";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function goTab(name){
  const i=getTabs().indexOf(name);
  if(i>=0){activeTab=i;buildTabs();renderTab();}
}
function showModal(h){document.getElementById("modalBox").innerHTML=h;document.getElementById("modalBg").classList.remove("hidden");}
function closeModal(){document.getElementById("modalBg").classList.add("hidden");}
